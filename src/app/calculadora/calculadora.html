<div class="container">
  <h2>Cálculo de Indicadores</h2>

  <mat-form-field appearance="outline">
    <mat-label>Massa salarial</mat-label>
    <input matInput type="number" [(ngModel)]="massaSalarial">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Número de CATs</mat-label>
    <input matInput type="number" [(ngModel)]="numCats">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Dias de afastamento</mat-label>
    <input matInput type="number" [(ngModel)]="diasAfastamento">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Número de Benefícios B91</mat-label>
    <input matInput type="number" [(ngModel)]="beneficiosB91">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Número de Benefícios B31</mat-label>
    <input matInput type="number" [(ngModel)]="beneficiosB31">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>CNAE</mat-label>
    <input matInput type="text" [(ngModel)]="cnae">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>FAP</mat-label>
    <input matInput type="number" step="0.01" [(ngModel)]="fap">
  </mat-form-field>

  <button mat-raised-button color="primary" (click)="calcular()">Calcular</button>
</div>
